name: monitoring

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: lab-prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerts_rules_blackbox_exporter.yml:/etc/prometheus/alerts_rules_blackbox_exporter.yml
      - prometheus_lab_data:/prometheus
    networks:
      - lab_app_monitoring
    restart: unless-stopped

  blackbox:
    image: quay.io/prometheus/blackbox-exporter:latest
    container_name: blackbox-exporter
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml
    networks:
      - lab_app_monitoring
    restart: unless-stopped

  alertmanager:
    image: quay.io/prometheus/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager_blackbox.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - lab_app_monitoring
    restart: unless-stopped


networks:
  lab_app_monitoring:

volumes:
  prometheus_lab_data:
