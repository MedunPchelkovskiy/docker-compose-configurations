global:
  scrape_interval: 5s
  evaluation_interval: 10s

rule_files:
  - alerts_rules_blackbox_exporter.yml

alerting:
  alertmanagers:
    - static_configs:
      - targets:
        - alertmanager:9093

scrape_configs:
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://www.sinoptik.bg/veliko-turnovo-bulgaria-100725993/14-days
          - https://www.meteoblue.com/bg/%D0%B2%D1%80%D0%B5%D0%BC%D0%B5%D1%82%D0%BE/10-%D0%B4%D0%BD%D0%B5%D0%B2%D0%BD%D0%B0/%D0%B2%D0%B5%D0%BB%D0%B8%D0%BA%D0%BE-%D1%82%D1%8A%D1%80%D0%BD%D0%BE%D0%B2%D0%BE_%D0%B1%D1%8A%D0%BB%D0%B3%D0%B0%D1%80%D0%B8%D1%8F_725993
    relabel_configs:
      - source_labels: [ __address__ ]
        target_label: __param_target
      - source_labels: [ __param_target ]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

